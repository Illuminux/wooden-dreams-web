      <div class="breadcrumb">
        <a href="knuts-wooden-dreams.html">Startseite</a>
        <span>›</span>
        Kontakt
      </div>

      <h1>Kontakt</h1>

      <p>Du möchtest mir etwas schreiben? Nutze einfach das folgende Formular oder sende eine E‑Mail an <a href="mailto:admin@welzels.de">admin@welzels.de</a>.</p>

      <form action="mailto:admin@welzels.de" method="post" enctype="text/plain" class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" name="Name" required />

        <label for="email">E‑Mail</label>
        <input type="email" id="email" name="E-Mail" required />

        <label for="message">Nachricht</label>
        <textarea id="message" name="Nachricht" rows="6" required></textarea>

        <button type="submit">Senden</button>
      </form>

      <p>Alternativ kannst du mich auch direkt per Mail erreichen: <a href="mailto:admin@welzels.de">admin@welzels.de</a></p>

      <br>
      <a href="knuts-wooden-dreams.html" class="back-link">← Zurück zur Übersicht</a>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="footer.js"></script>
